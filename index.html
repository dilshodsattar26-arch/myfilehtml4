<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game 4</title>
    <style>
        body { background: #0a0a0a; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; color: white; }
        h1 { color: #00ff88; text-shadow: 0 0 20px #00ff88; margin-bottom: 10px; }
        .info { color: #888; margin-bottom: 20px; }
        canvas { border: 2px solid #00ff88; border-radius: 8px; box-shadow: 0 0 30px rgba(0,255,136,0.3); }
        .score-board { display: flex; gap: 40px; margin-top: 20px; }
        .score-item { text-align: center; }
        .score-item .val { font-size: 2em; font-weight: 800; color: #00ff88; }
        .score-item .lbl { color: #888; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>🎮 Snake Game #4</h1>
    <p class="info">Arrow keys or WASD to move</p>
    <canvas id="game" width="400" height="400"></canvas>
    <div class="score-board">
        <div class="score-item"><div class="val" id="score">0</div><div class="lbl">Score</div></div>
        <div class="score-item"><div class="val" id="highscore">0</div><div class="lbl">High Score</div></div>
        <div class="score-item"><div class="val" id="level">1</div><div class="lbl">Level</div></div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0, dy = 0;
        let score = 0, highScore = 0, level = 1;
        let speed = 150;
        function gameLoop() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) { reset(); return; }
            for (let s of snake) { if (s.x === head.x && s.y === head.y) { reset(); return; } }
            snake.unshift(head);
            if (head.x === food.x && head.y === food.y) {
                score += 10; level = Math.floor(score / 50) + 1;
                if (score > highScore) highScore = score;
                food = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
                document.getElementById('score').textContent = score;
                document.getElementById('highscore').textContent = highScore;
                document.getElementById('level').textContent = level;
            } else { snake.pop(); }
            draw();
            setTimeout(gameLoop, speed - level * 10);
        }
        function draw() {
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#00ff88' : '#00cc66';
                ctx.fillRect(s.x * gridSize + 1, s.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }
        function reset() { snake = [{x: 10, y: 10}]; dx = 0; dy = 0; score = 0; level = 1; document.getElementById('score').textContent = 0; document.getElementById('level').textContent = 1; draw(); }
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' || e.key === 'w') { if(dy!==1){dx=0;dy=-1;} }
            if (e.key === 'ArrowDown' || e.key === 's') { if(dy!==-1){dx=0;dy=1;} }
            if (e.key === 'ArrowLeft' || e.key === 'a') { if(dx!==1){dx=-1;dy=0;} }
            if (e.key === 'ArrowRight' || e.key === 'd') { if(dx!==-1){dx=1;dy=0;} }
        });
        draw(); gameLoop();
    </script>
</body>
</html>
